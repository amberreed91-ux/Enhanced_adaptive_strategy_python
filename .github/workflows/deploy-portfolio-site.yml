name: Deploy Portfolio Site (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - 'python_portfolio_20/**'
      - '.github/workflows/deploy-portfolio-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build site data
        run: python3 python_portfolio_20/portfolio_site/scripts/build_site_data.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: python_portfolio_20/portfolio_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
